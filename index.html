<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP Experiences — Hotel Xcaret Arte</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Serif+Display&family=DM+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #C9A96E; --gold2: #E8D5A8; --navy: #0D1B3E; --black: #080808; --white: #F7F4EE; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'DM Sans', sans-serif; background: var(--black); color: var(--white); line-height: 1.6; }
        .hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 2rem; background: linear-gradient(rgba(8,8,8,0.7),rgba(8,8,8,0.7)), url('https://images.unsplash.com/photo-1582719508461-905c673771fd?auto=format&fit=crop&q=80&w=2000'); background-size: cover; background-position: center; }
        h1 { font-family: 'DM Serif Display', serif; font-size: clamp(3rem, 8vw, 6rem); margin-bottom: 1rem; color: var(--gold2); }
        .form-container { max-width: 500px; margin: -100px auto 100px; background: rgba(13,27,62,0.9); padding: 2.5rem; border: 1px solid var(--gold); backdrop-filter: blur(10px); position: relative; z-index: 10; }
        input, select, button { width: 100%; padding: 1rem; margin-bottom: 1rem; background: transparent; border: 1px solid var(--gold); color: white; border-radius: 4px; }
        button { background: var(--gold); color: var(--navy); font-weight: 600; cursor: pointer; border: none; transition: 0.3s; }
        button:hover { background: var(--gold2); transform: translateY(-2px); }
        #chat-widget { position: fixed; bottom: 20px; right: 20px; z-index: 1000; }
        #chat-window { width: 350px; height: 450px; background: var(--navy); border: 1px solid var(--gold); display: none; flex-direction: column; margin-bottom: 15px; border-radius: 10px; overflow: hidden; }
        #chat-box { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background: rgba(0,0,0,0.2); }
        .msg { padding: 10px; border-radius: 8px; max-width: 85%; font-size: 0.9rem; }
        .user { align-self: flex-end; background: var(--gold); color: var(--navy); }
        .bot { align-self: flex-start; background: rgba(247,244,238,0.1); border: 1px solid var(--gold); }
        #chat-input-container { display: flex; padding: 10px; background: var(--navy); }
        #chat-toggle { width: 60px; height: 60px; background: var(--gold); border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; font-size: 1.5rem; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
    </style>
</head>
<body>

<section class="hero">
    <p style="letter-spacing:5px; color:var(--gold); font-family:'Bebas Neue'">VIP EXPERIENCES</p>
    <h1>XCARET ARTE</h1>
    <p>El siguiente nivel de hospitalidad te espera.</p>
</section>

<div class="form-container">
    <div id="form-fields">
        <input type="text" id="f-nombre" placeholder="Nombre completo">
        <input type="email" id="f-email" placeholder="Correo electrónico">
        <input type="tel" id="f-tel" placeholder="WhatsApp">
        <select id="f-mood">
            <option value="artistas">Casa de los Artistas (Exclusiva)</option>
            <option value="paz">Casa de la Paz (Relajación)</option>
            <option value="musica">Casa de la Música</option>
            <option value="diseno">Casa del Diseño</option>
        </select>
        <p id="f-err" style="color:#ff6b6b; display:none; margin-bottom:10px; font-size:0.8rem;"></p>
        <button id="f-btn" onclick="submitForm()">RESERVAR EXPERIENCIA VIP</button>
    </div>
    <div id="f-ok" style="display:none; text-align:center; padding: 20px;">
        <h2 style="color:var(--gold)">¡Mensaje Enviado!</h2>
        <p>Un Concierge VIP te contactará a la brevedad.</p>
    </div>
</div>

<div id="chat-widget">
    <div id="chat-window">
        <div style="background:var(--gold); color:var(--navy); padding:12px; font-weight:bold; text-align:center;">CONCIERGE VIP ARTE</div>
        <div id="chat-box"></div>
        <div id="chat-input-container">
            <input type="text" id="chat-input" placeholder="Pregúntame lo que quieras..." onkeypress="if(event.key==='Enter') sendMsg()">
        </div>
    </div>
    <div id="chat-toggle" onclick="toggleChat()">💬</div>
</div>

<script>
    let hist = [];
    const GROQ_KEY = "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";
    const FORM_URL = "https://formspree.io/f/xpqodgnn";

    function toggleChat() {
        const win = document.getElementById('chat-window');
        win.style.display = win.style.display === 'flex' ? 'none' : 'flex';
        if(hist.length === 0) addMsg("¡Hola! Soy tu Concierge VIP. ¿Quieres saber sobre los restaurantes de autor o las Casas del Hotel Xcaret Arte?", 'bot');
    }

    function addMsg(text, sender) {
        const box = document.getElementById('chat-box');
        const div = document.createElement('div');
        div.className = 'msg ' + sender;
        div.textContent = text;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }

    async function sendMsg() {
        const input = document.getElementById('chat-input');
        const msg = input.value.trim();
        if(!msg) return;
        input.value = '';
        addMsg(msg, 'user');
        hist.push({role: 'user', content: msg});

        try {
            const r = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${GROQ_KEY}` },
                body: JSON.stringify({ model: "llama3-8b-8192", messages: [{role: "system", content: "Eres el Concierge VIP de Xcaret Arte. Tono sofisticado y experto."}, ...hist] })
            });
            const d = await r.json();
            const reply = d.choices[0].message.content;
            hist.push({role: 'assistant', content: reply});
            addMsg(reply, 'bot');
        } catch(e) {
            addMsg('Estoy atendiendo a muchos huéspedes. Por favor, llena el formulario arriba para darte prioridad.', 'bot');
        }
    }

    async function submitForm() {
        const n = document.getElementById('f-nombre').value, em = document.getElementById('f-email').value;
        const btn = document.getElementById('f-btn'), err = document.getElementById('f-err');
        if(!em) { err.textContent='El email es necesario.'; err.style.display='block'; return; }
        btn.disabled = true; btn.textContent = 'Enviando...';
        try {
            const r = await fetch(FORM_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nombre: n, email: em, tel: document.getElementById('f-tel').value, casa: document.getElementById('f-mood').value })
            });
            if(r.ok) { document.getElementById('form-fields').style.display = 'none'; document.getElementById('f-ok').style.display = 'block'; }
        } catch(e) { btn.disabled = false; btn.textContent = 'REINTENTAR'; }
    }
</script>
</body>
</html>
